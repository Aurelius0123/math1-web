    <title>재수반 - 강의 목록</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; margin: 0; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; }
        .back-btn { align-self: flex-start; max-width: 800px; margin: 0 auto 20px auto; width: 100%; cursor: pointer; color: #666; text-decoration: underline; }
        .lecture-container { background: white; width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box; }
        h1 { font-size: 24px; color: #222; margin-bottom: 25px; border-bottom: 2px solid #e74c3c; padding-bottom: 15px; } /* 재수반은 빨간색 포인트 */
        .lecture-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 10px; border-bottom: 1px solid #eee; }
        .lecture-item:last-child { border-bottom: none; }
        .lecture-info { display: flex; flex-direction: column; gap: 5px; }
        .lecture-title { font-size: 16px; font-weight: bold; color: #333; }
        .lecture-meta { font-size: 13px; color: #888; }
        .btn-play { background-color: #e74c3c; color: white; text-decoration: none; padding: 8px 16px; font-size: 14px; border-radius: 4px; font-weight: 500; transition: background-color 0.2s; }
        .btn-play:hover { background-color: #c0392b; }
    </style>
</head>
